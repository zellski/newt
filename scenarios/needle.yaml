# Port of demo/Needle.C: a thin rod falling onto a frictionless
# surface, tipping over and coming to rest. The first two stage
# durations are optimizer variables. 8*pi/17 = 1.478396542865785.
name: Needle
creature: creatures/needle.creature.yaml
gravity: -9.81
integrator: { type: gauss, n: 5 }
stages:
  - name: I1
    pieces: 16
    duration: { min: 0.1, max: 2, start: 0.5 }
    reps:
      - { dof: X, type: hermlet, from: 0, to: 0 }
      - { dof: Y, type: hermlet, from: 1, to: 0 }
      - { dof: Alpha, type: hermlet, from: 1.478396542865785, to: 1.478396542865785 }
  - name: I2
    pieces: 16
    duration: { min: 0.1, max: 2, start: 0.3 }
    reps:
      - { dof: X, type: hermlet, from: 0, to: 0 }
      - { dof: Y, type: hermlet, from: 0, to: -1 }
      - { dof: Alpha, type: hermlet, from: 1.478396542865785, to: 0 }
  - name: I3
    pieces: 8
    duration: 0.1
    reps:
      - { dof: X, type: hermlet, from: -1, to: -1 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: Alpha, type: constant, value: 0 }
impulses:
  - { stage: I1, point: P1.Top, direction: [0, 1] }
  - { stage: I2, point: P1.Bot, direction: [0, 1] }
links:
  - [I1, I2]
  - [I2, I3]
constraints:
  - { stage: I1, dof: Alpha, quantity: q,    at: start, equals: 1.478396542865785 }
  - { stage: I1, dof: Alpha, quantity: qdot, at: start, equals: 0 }
  - { stage: I1, dof: Y,     quantity: q,    at: start, equals: 1 }
  - { stage: I1, dof: Y,     quantity: qdot, at: start, equals: 0 }
  - { stage: I1, dof: X,     quantity: q,    at: start, equals: 0 }
  - { stage: I1, dof: X,     quantity: qdot, at: start, equals: 0 }
