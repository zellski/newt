# Port of demo/Snake.C: an eight-link pendulum swinging from hanging
# to inverted in one second, under gravity. Muscle weights fall off as
# 1/(i+1) toward the tail.
name: Snake
creature: creatures/snake.creature.yaml
gravity: -9.81
integrator: { type: gauss, n: 5 }
stages:
  - name: S1
    pieces: 16
    duration: 1
    muscles:
      - { dof: Link0, weight: 1 }
      - { dof: Link1, weight: 1/2 }
      - { dof: Link2, weight: 1/3 }
      - { dof: Link3, weight: 1/4 }
      - { dof: Link4, weight: 1/5 }
      - { dof: Link5, weight: 1/6 }
      - { dof: Link6, weight: 1/7 }
      - { dof: Link7, weight: 1/8 }
    reps:
      - { dof: X, type: constant, value: 0 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: Link0, type: hat, from: -pi/2, to: pi/2,
          min: -pi, max: pi }
      - { dof: Link1, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link2, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link3, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link4, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link5, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link6, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
      - { dof: Link7, type: hat, from: 0, to: 0,
          min: -pi/4, max: pi/4 }
    constraints:
      - { dof: Link0, quantity: q,    at: start, equals: -pi/2 }
      - { dof: Link0, quantity: qdot, at: start, equals: 0 }
      - { dof: Link0, quantity: q,    at: end,   equals: pi/2 }
      - { dof: Link0, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link1, quantity: q,    at: start, equals: 0 }
      - { dof: Link1, quantity: qdot, at: start, equals: 0 }
      - { dof: Link1, quantity: q,    at: end,   equals: 0 }
      - { dof: Link1, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link2, quantity: q,    at: start, equals: 0 }
      - { dof: Link2, quantity: qdot, at: start, equals: 0 }
      - { dof: Link2, quantity: q,    at: end,   equals: 0 }
      - { dof: Link2, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link3, quantity: q,    at: start, equals: 0 }
      - { dof: Link3, quantity: qdot, at: start, equals: 0 }
      - { dof: Link3, quantity: q,    at: end,   equals: 0 }
      - { dof: Link3, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link4, quantity: q,    at: start, equals: 0 }
      - { dof: Link4, quantity: qdot, at: start, equals: 0 }
      - { dof: Link4, quantity: q,    at: end,   equals: 0 }
      - { dof: Link4, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link5, quantity: q,    at: start, equals: 0 }
      - { dof: Link5, quantity: qdot, at: start, equals: 0 }
      - { dof: Link5, quantity: q,    at: end,   equals: 0 }
      - { dof: Link5, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link6, quantity: q,    at: start, equals: 0 }
      - { dof: Link6, quantity: qdot, at: start, equals: 0 }
      - { dof: Link6, quantity: q,    at: end,   equals: 0 }
      - { dof: Link6, quantity: qdot, at: end,   equals: 0 }
      - { dof: Link7, quantity: q,    at: start, equals: 0 }
      - { dof: Link7, quantity: qdot, at: start, equals: 0 }
      - { dof: Link7, quantity: q,    at: end,   equals: 0 }
      - { dof: Link7, quantity: qdot, at: end,   equals: 0 }
