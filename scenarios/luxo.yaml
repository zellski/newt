# Port of demo/Luxo.C: crouch, leap two meters, land and stabilize.
# Rest pose: Beta = 3*pi/11, Gamma = -6*pi/11, Delta = -pi/11.
# Flight time is the ballistic sqrt(1.5 * LEAP_LENGTH / g).
name: Luxo
creature: creatures/luxo.creature.yaml
gravity: -9.81
integrator: { type: simpson, n: 25 }
stages:
  # crouch, nailed to the floor, gathering leap momentum
  - name: S1
    pieces: 6
    duration: 0.2
    muscles:
      - { dof: Beta,  weight: 2 }
      - { dof: Gamma, weight: 1 }
      - { dof: Delta, weight: 2 }
    reps:
      - { dof: X, type: constant, value: -1.0 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: Alpha, type: constant, value: pi/2 }
      - { dof: Beta, type: hermite, from: 3*pi/11, to: pi/11,
          min: -2*pi/11, max: 4*pi/11 }
      - { dof: Gamma, type: hermite, from: -6*pi/11, to: -3*pi/11,
          min: -7*pi/11, max: 0 }
      - { dof: Delta, type: hermite, from: -pi/11, to: -pi/11,
          min: -2*pi/11, max: 0 }
    constraints:
      - { dof: Beta,  quantity: q,    at: start, equals: 3*pi/11 }
      - { dof: Beta,  quantity: qdot, at: start, equals: 0 }
      - { dof: Gamma, quantity: q,    at: start, equals: -6*pi/11 }
      - { dof: Gamma, quantity: qdot, at: start, equals: 0 }
      - { dof: Delta, quantity: q,    at: start, equals: -pi/11 }
      - { dof: Delta, quantity: qdot, at: start, equals: 0 }

  # flight; landing impact vectors of unknown magnitude
  - name: S2
    pieces: 12
    duration: sqrt(1.5*2.0/9.81)
    muscles:
      - { dof: Beta,  weight: 2 }
      - { dof: Gamma, weight: 1 }
      - { dof: Delta, weight: 2 }
    reps:
      - { dof: X, type: hermite, from: -1.0, to: 1.0 }
      - { dof: Y, type: hermite, from: 0.5, to: 0.5 }
      - { dof: Alpha, type: hermite, from: pi/2, to: pi/2,
          min: pi/3, max: 2*pi/3 }
      - { dof: Beta, type: hermite, from: pi/11, to: pi/11,
          min: -pi/11, max: 4*pi/11 }
      - { dof: Gamma, type: hermite, from: -3*pi/11, to: -3*pi/11,
          min: -6*pi/11, max: 0 }
      - { dof: Delta, type: hermite, from: -pi/11, to: -pi/11,
          min: -2*pi/11, max: 0 }
    impulses:
      - { point: Base.BaseRight, direction: [0, 1] }
      - { point: Base.BaseLeft,  direction: [0, 1] }
      - { point: Base.BaseMid,   direction: [1, 0] }

  # landed; stabilize back to rest
  - name: S3
    pieces: 6
    duration: 0.2
    muscles:
      - { dof: Beta,  weight: 2 }
      - { dof: Gamma, weight: 1 }
      - { dof: Delta, weight: 2 }
    reps:
      - { dof: X, type: constant, value: 1.0 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: Alpha, type: constant, value: pi/2 }
      - { dof: Beta, type: hermite, from: pi/11, to: 3*pi/11,
          min: -2*pi/11, max: 4*pi/11 }
      - { dof: Gamma, type: hermite, from: -3*pi/11, to: -6*pi/11,
          min: -6*pi/11, max: 0 }
      - { dof: Delta, type: hermite, from: -pi/11, to: -pi/11,
          min: -2*pi/11, max: 0 }
    constraints:
      - { dof: Beta,  quantity: q,    at: end, equals: 3*pi/11 }
      - { dof: Beta,  quantity: qdot, at: end, equals: 0 }
      - { dof: Gamma, quantity: q,    at: end, equals: -6*pi/11 }
      - { dof: Gamma, quantity: qdot, at: end, equals: 0 }
      - { dof: Delta, quantity: q,    at: end, equals: -pi/11 }
      - { dof: Delta, quantity: qdot, at: end, equals: 0 }
links:
  - [S1, S2]
  - [S2, S3]
