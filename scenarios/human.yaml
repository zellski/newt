# Port of demo/Human.C: crouch, backflip (the lower-leg angle winds up
# a full 2*pi), land back at rest.
# Rest pose:    LL = pi/8, UL = 7*pi/8, Torso = -5*pi/8, UA = pi/4, LA = 5*pi/8.
# Stretch pose: LL = 7*pi/16, UL = pi/8, Torso = -pi/16, UA = LA = 0.
name: Human
creature: creatures/human.creature.yaml
gravity: -9.81
integrator: { type: gauss, n: 10 }
stages:
  # crouch from rest into the stretch pose
  - name: S1
    pieces: 8
    duration: 0.3
    muscles:
      - { dof: TorsoAngle, weight: 1 }
      - { dof: UAAngle, weight: 1 }
      - { dof: LAAngle, weight: 1 }
      - { dof: ULAngle, weight: 1 }
      - { dof: LLAngle, weight: 1 }
    reps:
      - { dof: X, type: constant, value: 0 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: LLAngle, type: hermlet, from: pi/8, to: 7*pi/16,
          min: 0, max: pi/2, pin: start }
      - { dof: ULAngle, type: hermlet, from: 7*pi/8, to: pi/8,
          min: 0, max: 15*pi/16, pin: start }
      - { dof: TorsoAngle, type: hermlet, from: -5*pi/8, to: -pi/16,
          min: -7*pi/8, max: 0, pin: start }
      - { dof: UAAngle, type: hermlet, from: pi/4, to: 0,
          min: 0, max: pi, pin: start }
      - { dof: LAAngle, type: hermlet, from: 5*pi/8, to: 0,
          min: 0, max: pi, pin: start }
      - { dof: RHandAngle, type: constant, value: 0 }
      - { dof: NeckAngle, type: constant, value: 0 }
      - { dof: HeadAngle, type: constant, value: 0 }

  # airborne: the lower leg sweeps through a full revolution
  - name: S2
    pieces: 8
    duration: 1.0
    muscles:
      - { dof: TorsoAngle, weight: 1 }
      - { dof: UAAngle, weight: 1 }
      - { dof: LAAngle, weight: 1 }
      - { dof: ULAngle, weight: 1 }
      - { dof: LLAngle, weight: 1 }
    reps:
      - { dof: X, type: hermlet, from: 0, to: 0 }
      - { dof: Y, type: hermlet, from: 0, to: 0 }
      - { dof: LLAngle, type: hermlet, from: 7*pi/16, to: 7*pi/16 + 2*pi,
          min: 0, max: 10*pi }
      - { dof: ULAngle, type: hermlet, from: pi/8, to: pi/8,
          min: 0, max: 15*pi/16 }
      - { dof: TorsoAngle, type: hermlet, from: -pi/16, to: -pi/16,
          min: -7*pi/8, max: 10*pi }
      - { dof: UAAngle, type: hermlet, from: 0, to: 0,
          min: 0, max: pi }
      - { dof: LAAngle, type: hermlet, from: 0, to: 0,
          min: 0, max: pi }
      - { dof: RHandAngle, type: constant, value: 0 }
      - { dof: NeckAngle, type: constant, value: 0 }
      - { dof: HeadAngle, type: constant, value: 0 }
    impulses:
      - { point: LL.LLBot, direction: [0, 1] }

  # landed: settle back to the rest pose (one revolution ahead)
  - name: S3
    pieces: 8
    duration: 0.3
    muscles:
      - { dof: TorsoAngle, weight: 1 }
      - { dof: UAAngle, weight: 1 }
      - { dof: LAAngle, weight: 1 }
      - { dof: ULAngle, weight: 1 }
      - { dof: LLAngle, weight: 1 }
    reps:
      - { dof: X, type: constant, value: 0 }
      - { dof: Y, type: constant, value: 0 }
      - { dof: LLAngle, type: hermlet, from: 7*pi/16 + 2*pi, to: pi/8 + 2*pi,
          min: 0, max: 10*pi, pin: end }
      - { dof: ULAngle, type: hermlet, from: pi/8, to: 7*pi/8,
          min: 0, max: 15*pi/16, pin: end }
      - { dof: TorsoAngle, type: hermlet, from: -pi/16, to: -5*pi/8,
          min: -7*pi/8, max: 0, pin: end }
      - { dof: UAAngle, type: hermlet, from: 0, to: pi/4,
          min: 0, max: pi, pin: end }
      - { dof: LAAngle, type: hermlet, from: 0, to: 5*pi/8,
          min: 0, max: pi, pin: end }
      - { dof: RHandAngle, type: constant, value: 0 }
      - { dof: NeckAngle, type: constant, value: 0 }
      - { dof: HeadAngle, type: constant, value: 0 }
links:
  - [S1, S2]
  - [S2, S3]
